// Release-file metadata for the TrackSuite.work apt repository.
// Consumed by `apt-ftparchive release` in the apt_repo CI job. The repo is a
// simple, statically-generated (no reprepro DB) single-suite/single-arch repo
// hosted on GitHub Pages; it is regenerated from the accumulated pool each run.
APT::FTPArchive::Release {
    Origin "TrackSuite.work";
    Label "TrackSuite.work";
    Suite "stable";
    Codename "stable";
    Architectures "amd64";
    Components "main";
    Description "TrackSuite.work desktop app — apt repository";
};
